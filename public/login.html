<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sustentacao - Cardway</title>
  <link rel="icon" href="/api/static/ico.png" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <img class="bg" src="/api/static/bg.png" alt="" aria-hidden="true" />

  <main class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <img src="/api/static/ico.png" alt="Cardway" class="logo" />
        <h1>Sustentacao</h1>
        <p>Portal interno do time</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field">
          <label for="login">Login</label>
          <input
            type="text"
            id="login"
            name="login"
            placeholder="denyson.dplacido"
            required
            autocomplete="username"
            spellcheck="false"
            autocapitalize="none"
          />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="********"
            required
            autocomplete="current-password"
          />
        </div>

        <div class="error-msg" id="errorMsg" hidden></div>

        <button type="submit" class="btn-login" id="submitBtn">Entrar</button>
      </form>
    </div>
  </main>

  <script src="/js/login.js"></script>
</body>
</html>
