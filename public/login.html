<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Cardway</title>
  <meta name="description" content="Acesso ao portal de sustentação da Cardway." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #06070a;
      --bg-2: #0d1117;
      --panel: rgba(12, 16, 24, 0.96);
      --panel-border: rgba(71, 89, 118, 0.45);
      --field: #101826;
      --field-border: #273244;
      --text: #e9eef7;
      --muted: #92a0b6;
      --accent: #ff6a00;
      --accent-2: #ff8a2a;
      --shadow: 0 24px 72px rgba(0, 0, 0, 0.58);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 106, 0, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(6, 7, 10, 0.95), rgba(6, 7, 10, 0.98)),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.45;
      mask-image: radial-gradient(circle at center, black 30%, transparent 78%);
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .card {
      width: min(420px, 100%);
      padding: 34px 36px 30px;
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 26px;
    }

    .brand-logo {
      width: 178px;
      max-width: 100%;
      display: block;
    }

    .title {
      margin: 0 0 8px;
      font-size: 1.45rem;
      line-height: 1.1;
      font-weight: 800;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .field {
      margin-bottom: 14px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--field-border);
      border-radius: 12px;
      background: linear-gradient(180deg, #0b1018, var(--field));
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .input-wrap input::placeholder { color: #76849b; }

    .input-wrap input:focus {
      border-color: rgba(255, 122, 28, 0.72);
      box-shadow: 0 0 0 4px rgba(255, 122, 28, 0.12);
    }

    .password-row {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 1px;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border: 0;
      border-left: 1px solid rgba(71, 89, 118, 0.75);
      border-radius: 0 12px 12px 0;
      background: rgba(17, 24, 38, 0.96);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .toggle-password:hover { background: rgba(24, 32, 48, 0.98); }

    .forgot {
      display: inline-flex;
      margin: 4px 0 16px;
      color: var(--accent);
      font-size: 0.88rem;
      text-decoration: none;
    }

    .forgot:hover { text-decoration: underline; }

    .error {
      min-height: 46px;
      margin-bottom: 14px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 107, 107, 0.28);
      background: rgba(255, 107, 107, 0.09);
      color: #ffb6b6;
      line-height: 1.35;
      font-size: 0.92rem;
    }

    .btn {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(255, 106, 0, 0.22);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(255, 106, 0, 0.30);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      color: #b2bed0;
      font-size: 0.92rem;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>

  <main class="shell">
    <section class="card" aria-label="Login Cardway">
      <div class="brand" aria-label="Cardway">
        <img class="brand-logo" src="/cardway-logo-DmLFa68k.svg" alt="Cardway" />
      </div>

      <h1 class="title">Portal de Sustentação</h1>
      <p class="subtitle">Bem-vindo. Entre com suas credenciais para continuar.</p>

      <form id="loginForm" novalidate>
        <div class="field">
          <div class="input-wrap">
            <input
              id="login"
              name="login"
              type="text"
              placeholder="E-mail corporativo *"
              autocomplete="username"
              spellcheck="false"
              autocapitalize="none"
              required
            />
          </div>
        </div>

        <div class="field password-row">
          <div class="input-wrap">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Senha *"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12Z" />
                <circle cx="12" cy="12" r="3.2" />
              </svg>
            </button>
          </div>
        </div>

        <a class="forgot" href="#">Esqueci minha senha</a>

        <div class="error" id="errorMsg" hidden></div>

        <button class="btn" id="submitBtn" type="submit">Entrar</button>
      </form>

      <div class="footer">
        Novo por aqui? <a href="#">Crie uma conta</a>
      </div>
    </section>
  </main>

  <script src="/js/login.js" defer></script>
</body>
</html>
